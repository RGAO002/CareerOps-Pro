name: Sync to HuggingFace Space

on:
  push:
    branches:
      - deploy-streamlit

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://gruoping:$HF_TOKEN@huggingface.co/spaces/gruoping/CareerOps-Pro deploy-streamlit:main --force
